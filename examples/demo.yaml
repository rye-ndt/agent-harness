name: demo
nodes:
  - id: analyze
    type: agent-task
    config:
      prompt: |
        Read any files under context/ and produce a short analysis of the task:
        goal, requirements, and a checklist of what must be done.
      artifacts:
        - plans/analysis.md

  - id: approve-analysis
    type: human-gate
    needs: [analyze]
    config:
      artifact: plans/analysis.md
      summary: Confirm the analysis matches your understanding of the task.

  - id: implement
    type: agent-task
    needs: [approve-analysis]
    config:
      prompt: |
        Follow the approved analysis in plans/analysis.md and write an
        implementation report describing what was done.
      artifacts:
        - reports/implementation.md
