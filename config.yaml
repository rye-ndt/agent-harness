# Application configuration. Fields go here as Config grows.
app:
  name: master_harness
  w: 1024
  h: 768
  bg: "#1B2636"
version: 0.0.1
log_level: info # debug | info | warn | error

agent_harness:
  claude_code:
    name: Claude Code
    bin_name: claude_code
    release_base: https://downloads.claude.ai/claude-code-releases
    login_timeout: 5m
    token_regex: sk-ant-oat[0-9]{2}-[A-Za-z0-9_-]{20,}
    ansi_regex: \x1b\[[0-9;?]*[a-zA-Z]
  open_code:
    name: Open Code
    bin_name: open_code
    release_base: https://api.github.com/repos/sst/opencode
    login_timeout: 5m
